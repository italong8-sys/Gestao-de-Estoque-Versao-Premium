<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP ULTRA MASTER PRO - V2026</title>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --bg: #0f172a; --card: #020617; --text: #e2e8f0; --accent: #38bdf8;
            --neon-pink: #ff00ff; --neon-green: #39ff14;
        }
        .light-mode { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --accent: #0284c7; }

        body { margin: 0; font-family: 'Segoe UI', system-ui; background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #020617; border-bottom: 2px solid var(--accent); min-height: 60px; }
        
        .user-area { display: flex; align-items: center; gap: 15px; }
        .user { color: var(--neon-green); font-weight: bold; text-shadow: 0 0 5px var(--neon-green); }
        .config-btn { cursor: pointer; font-size: 22px; transition: transform 0.4s; }

        /* Estilo Login */
        #loginArea { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 80vh; padding: 20px;
        }
        .login-card { 
            width: 100%; max-width: 380px; background: var(--card); 
            padding: 30px; border-radius: 15px; border: 1px solid var(--accent);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .menu-geral { display: flex; flex-wrap: wrap; gap: 10px; padding: 10px 20px; background: rgba(0,0,0,0.3); }
        .menu-geral button { flex: 1; min-width: 140px; padding: 12px; border: none; border-radius: 8px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 12px; }

        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        h3 { margin-top: 0; color: var(--accent); border-bottom: 1px solid #1e293b; padding-bottom: 10px; font-size: 16px; }

        label { font-size: 12px; font-weight: bold; margin-top: 10px; display: block; color: var(--accent); }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        
        .action { width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--neon-green); color: #020617; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th { background: #1e293b; color: var(--accent); padding: 8px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #1e293b; }

        #relogio { font-family: monospace; font-size: 14px; color: var(--neon-green); margin-right: 20px; }
        
        #modalConfig { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .hidden { display: none !important; }
        .footer-credits { text-align: center; padding: 20px; font-size: 12px; opacity: 0.7; border-top: 1px solid #334155; margin-top: 20px; }
        
        /* Checkbox mostrar senha */
        .show-pass-area { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 13px; cursor: pointer; }
        .show-pass-area input { width: auto; margin: 0; }
    </style>
</head>
<body>

<header>
    <div>🚀 <strong>GESTÃO DE ESTOQUE VERSÃO PREMIUM</strong></div>
    <div id="relogioContainer" class="hidden"></div>
    <div class="user-area">
        <span id="usuarioTopo" class="user"></span>
        <span id="btnConfigGlobal" class="config-btn hidden" onclick="abrirConfig()">⚙️</span>
    </div>
</header>

<div id="loginArea">
    <div class="login-card">
        <h3>🔐 Acesso ao Sistema</h3>
        <p style="font-size: 11px; opacity: 0.6; margin-top: -10px;">Entre com seus dados ou registre-se no primeiro acesso.</p>
        
        <label>👤 Usuário</label>
        <input id="userLogin" placeholder="Nome de usuário">
        
        <label>🔑 Senha</label>
        <input id="passLogin" type="password" placeholder="Sua senha">
        
        <label class="show-pass-area">
            <input type="checkbox" onclick="toggleSenha()"> Revelar senha
        </label>
        
        <button class="action btn-save" onclick="autenticar()">🔓 ENTRAR / REGISTRAR</button>
    </div>
</div>

<div id="app" class="hidden">
    <nav class="menu-geral">
        <button onclick="mostrar('estoque')">📦 Estoque</button>
        <button onclick="mostrar('notas')">🧾 Entrada NF</button>
        <button onclick="mostrar('hist_notas')">📜 Hist. NF</button>
        <button onclick="mostrar('venda')">💰 Nova Venda</button>
        <button onclick="mostrar('vendas_hist')">📊 Controle Vendas</button>
        <button onclick="mostrar('requisicao')">📝 Requisição</button>
        <button onclick="mostrar('calculadora')">🧮 Calc</button>
        <button onclick="logout()" style="background:#ef4444;">🚪 Sair</button>
    </nav>

    <div id="estoque" class="container section">
        <div class="card">
            <h3>📦 Cadastro de Material</h3>
            <label>🏷️ Nome</label><input id="estNome">
            <label>⚠️ Mínimo</label><input id="estMin" type="number">
            <label>🔖 Código (SKU)</label>
            <div style="display:flex; gap:5px;"><input id="estCod"><button onclick="abrirCam('estCod')" style="background:var(--accent); border:none; color:white; padding:5px; border-radius:5px;">📷</button></div>
            <button class="action btn-save" onclick="addEstoque()">SALVAR ITEM</button>
        </div>
        <div class="card"><h3>📊 Inventário</h3><table><thead><tr><th>Produto</th><th>Saldo</th><th>Min</th></tr></thead><tbody id="tabEstoque"></tbody></table></div>
    </div>
    
    </div>

<div id="modalConfig">
    <div class="card" style="width: 320px;">
        <h3>⚙️ Ajustes</h3>
        <button class="action" onclick="toggleFullScreen()">🖥️ TELA CHEIA</button>
        <button class="action" onclick="toggleTema()">🌓 TEMA</button>
        <label><input type="checkbox" id="checkRelogio" onchange="toggleRelogio()"> Exibir Relógio Digital</label>
        <label>Nova Senha</label><input id="newPass" type="password">
        <button class="action btn-save" onclick="saveConfig()">SALVAR</button>
        <button class="action" onclick="fecharConfig()">FECHAR</button>
    </div>
</div>

<footer class="footer-credits">
    ©Italo Dos Anjos 2026
</footer>

<script>
    // Banco de dados Local
    let db = {
        estoque: JSON.parse(localStorage.getItem('db_est')) || [],
        notas: JSON.parse(localStorage.getItem('db_notas')) || [],
        vendas: JSON.parse(localStorage.getItem('db_vendas')) || [],
        usuarios: JSON.parse(localStorage.getItem('db_users')) || {'admin': '123'},
        conf: JSON.parse(localStorage.getItem('db_conf')) || {relogio: false}
    };

    // --- LÓGICA DE LOGIN ---
    function toggleSenha() {
        const passInput = document.getElementById('passLogin');
        passInput.type = passInput.type === 'password' ? 'text' : 'password';
    }

    function autenticar() {
        const u = document.getElementById('userLogin').value.trim();
        const p = document.getElementById('passLogin').value.trim();

        if (!u || !p) {
            alert("Por favor, preencha usuário e senha.");
            return;
        }

        // Registro Automático se usuário não existir
        if (!db.usuarios[u]) {
            db.usuarios[u] = p;
            localStorage.setItem('db_users', JSON.stringify(db.usuarios));
            alert("✨ Novo usuário registrado!");
        }

        // Validação
        if (db.usuarios[u] === p) {
            localStorage.setItem('logado', u);
            iniciarApp(u);
        } else {
            alert("❌ Senha incorreta!");
        }
    }

    function logout() {
        localStorage.removeItem('logado');
        location.reload(); // Recarrega para voltar à tela de login limpa
    }

    function iniciarApp(usuario) {
        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('btnConfigGlobal').classList.remove('hidden');
        document.getElementById('usuarioTopo').innerText = `👤 ${usuario.toUpperCase()}`;
        
        // Ativa relógio se configurado
        if(db.conf.relogio) {
            document.getElementById('relogioContainer').classList.remove('hidden');
            document.getElementById('checkRelogio').checked = true;
        }
        
        renderizarTudo();
    }

    // --- SISTEMA ---
    function mostrar(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
        const el = document.getElementById(id);
        if(el) el.classList.remove('hidden');
    }

    function toggleRelogio() {
        db.conf.relogio = document.getElementById('checkRelogio').checked;
        document.getElementById('relogioContainer').classList.toggle('hidden', !db.conf.relogio);
        localStorage.setItem('db_conf', JSON.stringify(db.conf));
    }

    function atualizarRelogio() {
        if(!db.conf.relogio) return;
        const agora = new Date();
        const dias = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
        document.getElementById('relogioContainer').innerHTML = 
            `<div id="relogio">${agora.toLocaleDateString()} (${dias[agora.getDay()]}) - ${agora.toLocaleTimeString()}</div>`;
    }
    setInterval(atualizarRelogio, 1000);

    // [Outras funções mantidas: addEstoque, renderizarTudo, toggleFullScreen, abrirConfig, etc.]
    function renderizarTudo() {
        db.estoque.sort((a,b) => a.nome.localeCompare(b.nome));
        document.getElementById('tabEstoque').innerHTML = db.estoque.map(e => 
            `<tr><td>${e.nome}</td><td style="${e.qtd <= e.min ? 'color:red;font-weight:bold' : ''}">${e.qtd}</td><td>${e.min}</td></tr>`
        ).join('');
    }

    function abrirConfig() { document.getElementById('modalConfig').style.display = 'flex'; }
    function fecharConfig() { document.getElementById('modalConfig').style.display = 'none'; }
    function toggleTema() { document.body.classList.toggle('light-mode'); }

    // VERIFICAÇÃO INICIAL
    window.onload = () => {
        const usuarioLogado = localStorage.getItem('logado');
        if (usuarioLogado) {
            iniciarApp(usuarioLogado);
        }
    };
</script>
</body>
</html>
